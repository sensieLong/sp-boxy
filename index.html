<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD Dieline Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="studio-container">
        <aside class="sidebar">
            <div class="brand">
                <h2>DielineGen Pro</h2>
                <p>Mailer Box Specification Utility</p>
            </div>
            
            <form id="dieline-form" class="control-group">
                <h3>Dimensions (Inches)</h3>
                
                <div class="input-field">
                    <label for="length">Length (L)</label>
                    <input type="number" id="length" value="8.0" step="0.1" min="2" max="24" required>
                </div>

                <div class="input-field">
                    <label for="width">Width (W)</label>
                    <input type="number" id="width" value="6.0" step="0.1" min="2" max="24" required>
                </div>

                <div class="input-field">
                    <label for="height">Height (H)</label>
                    <input type="number" id="height" value="3.0" step="0.1" min="1" max="12" required>
                </div>

                <button type="button" id="btn-download" class="btn btn-primary">
                    Download Production PDF
                </button>

                <button type="button" id="btn-download-svg" class="btn btn-secondary">
                    Download SVG
                </button>
            </form>

            <div class="legend-card">
                <h3>Dieline Key</h3>
                <div class="legend-item"><span class="line-sample cut-line"></span> Blue Solid = Outer Cut Line</div>
                <div class="legend-item"><span class="line-sample score-line"></span> Red Dashed = Crease / Score Line</div>
            </div>
        </aside>

        <main class="preview-area">
            <div class="canvas-header">
                <h3>Live Structural Preview</h3>
                <span id="dimension-string">8.00" x 6.00" x 3.00"</span>
            </div>
            <div class="canvas-wrapper">
                <canvas id="dielineCanvas"></canvas>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
